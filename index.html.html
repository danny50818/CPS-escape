<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星光鎮：奧秘空間事件簿</title>
  <style>
    :root {
      --bg: #edf5f2;
      --ink: #15212a;
      --muted: #5b6b76;
      --panel: #ffffff;
      --panel-2: #f6fafc;
      --line: #ccdbe2;
      --teal: #1d8a7c;
      --teal-dark: #10645d;
      --amber: #f0b64b;
      --rose: #d75f70;
      --indigo: #6068b2;
      --blue: #77b5dc;
      --mint: #dff4ea;
      --shadow: 0 18px 48px rgba(28, 43, 55, 0.14);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(130deg, rgba(119,181,220,.26), transparent 34%),
        linear-gradient(250deg, rgba(240,182,75,.18), transparent 34%),
        var(--bg);
      overflow-x: hidden;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
    }

    .sidebar,
    .stage,
    .workspace,
    .console,
    .modal-card {
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(204,219,226,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      min-height: calc(100vh - 32px);
      position: sticky;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: conic-gradient(from 215deg, var(--teal), var(--amber), var(--indigo), var(--teal));
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.34);
      flex: 0 0 auto;
    }

    .brand h1 {
      font-size: 20px;
      margin: 0;
      line-height: 1.25;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 10px;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .role-grid {
      display: grid;
      gap: 8px;
    }

    .role-btn {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
      background: #fff;
      text-align: left;
      color: var(--ink);
      transition: transform 140ms ease, border 140ms ease, box-shadow 140ms ease;
    }

    .role-btn:hover,
    .role-btn.active {
      transform: translateY(-1px);
      border-color: var(--teal);
      box-shadow: 0 8px 18px rgba(29,138,124,.14);
    }

    .role-btn.active { background: var(--mint); }

    .role-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--teal);
      font-weight: 800;
    }

    .role-btn[data-role="police"] .role-icon { background: var(--indigo); }
    .role-btn[data-role="medical"] .role-icon { background: var(--rose); }

    .role-name {
      display: block;
      font-weight: 800;
      font-size: 14px;
    }

    .role-skill {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .meters {
      display: grid;
      gap: 10px;
    }

    .meter {
      display: grid;
      gap: 6px;
    }

    .meter label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #e4edf1;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), var(--amber));
      transition: width 360ms ease;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 8px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 20px;
      color: var(--teal-dark);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .inventory-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 7px;
      max-height: 220px;
      overflow: auto;
    }

    .inventory-list:empty::before {
      content: "尚未取得物件";
      color: var(--muted);
      font-size: 13px;
    }

    .inventory-list li {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
    }

    .item-btn,
    .small-btn {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: #344552;
      min-height: 34px;
      padding: 7px 9px;
      text-align: left;
      font-size: 13px;
    }

    .item-btn.selected {
      border-color: var(--teal);
      background: var(--mint);
      color: var(--teal-dark);
    }

    .small-btn {
      color: #9b3547;
      border-color: #e7b7bf;
      background: #fff0f2;
      text-align: center;
      white-space: nowrap;
    }

    .utility-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: auto;
    }

    .primary-btn,
    .ghost-btn,
    .object-btn,
    .map-node,
    .choice-btn {
      border-radius: var(--radius);
      min-height: 42px;
      transition: transform 140ms ease, box-shadow 140ms ease, border 140ms ease, background 140ms ease;
    }

    .primary-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      box-shadow: 0 10px 22px rgba(29,138,124,.22);
      padding: 0 16px;
    }

    .ghost-btn {
      color: var(--teal-dark);
      background: #edf8f5;
      border: 1px solid #b9dbd3;
      padding: 0 12px;
    }

    .main {
      display: grid;
      grid-template-rows: minmax(390px, 50vh) minmax(300px, 1fr);
      gap: 16px;
      min-width: 0;
    }

    .stage {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(119,181,220,.25), transparent 46%),
        #f8fcff;
    }

    .stage.role-social { filter: saturate(1.08) brightness(1.03); }
    .stage.role-police { filter: contrast(1.08) saturate(.9) hue-rotate(8deg); }
    .stage.role-medical { filter: saturate(.94) sepia(.06); }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: var(--pressure, 0);
      background:
        repeating-linear-gradient(180deg, rgba(22,30,44,.08) 0 1px, transparent 1px 7px),
        linear-gradient(180deg, transparent 0%, rgba(27,34,46,.35) 100%);
      transition: opacity 360ms ease;
      z-index: 3;
    }

    .stage-header {
      position: absolute;
      left: 18px;
      top: 16px;
      z-index: 4;
      max-width: min(620px, calc(100% - 36px));
    }

    .stage-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.86);
      border: 1px solid rgba(204,219,226,.82);
      color: var(--teal-dark);
      font-weight: 800;
      font-size: 13px;
    }

    .stage-title {
      margin: 10px 0 0;
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1.05;
      max-width: 12em;
      text-wrap: balance;
    }

    .map-svg {
      width: 100%;
      height: 100%;
      min-height: 390px;
      transform-origin: center;
      transition: transform 760ms cubic-bezier(.2,.8,.2,1), filter 360ms ease;
    }

    .stage[data-focus="plaza"] .map-svg { transform: scale(1.12) translate(96px, -10px); }
    .stage[data-focus="school"] .map-svg { transform: scale(1.22) translate(20px, -22px); }
    .stage[data-focus="clinic"] .map-svg { transform: scale(1.24) translate(-125px, -20px); }
    .stage[data-focus="station"] .map-svg { transform: scale(1.3) translate(-175px, -22px); }
    .stage[data-focus="mystery"] .map-svg { transform: scale(1.28) translate(-12px, -18px); }

    .window-light { animation: pulse 2.8s ease-in-out infinite; }
    .case-thread { stroke-dasharray: 7 9; animation: thread 1.1s linear infinite; }
    .scanner { animation: scan 4.2s linear infinite; }
    .station-layer {
      opacity: .16;
      filter: grayscale(1);
      transition: opacity 600ms ease, filter 600ms ease, transform 600ms ease;
    }

    .station-layer.unlocked {
      opacity: 1;
      filter: none;
      transform: translateX(-8px);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 0;
      overflow: hidden;
    }

    .map-panel {
      padding: 18px;
      min-width: 0;
    }

    .map-grid {
      position: relative;
      height: 340px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 24% 32%, rgba(29,138,124,.14), transparent 18%),
        radial-gradient(circle at 66% 40%, rgba(96,104,178,.14), transparent 20%),
        linear-gradient(135deg, rgba(255,255,255,.88), rgba(230,240,244,.75));
      overflow: hidden;
      margin-bottom: 14px;
    }

    .map-grid::before {
      content: "";
      position: absolute;
      left: 9%;
      right: 7%;
      top: 52%;
      height: 8px;
      border-radius: 999px;
      background: repeating-linear-gradient(90deg, #9fb4be 0 32px, #edf4f6 32px 50px);
      opacity: .74;
    }

    .map-grid::after {
      content: "";
      position: absolute;
      left: 42%;
      top: 18%;
      width: 7px;
      height: 66%;
      border-radius: 999px;
      background: rgba(159,180,190,.42);
    }

    .map-node {
      background: #fff;
      border: 1px solid var(--line);
      min-height: 82px;
      position: absolute;
      width: 18%;
      color: var(--ink);
      text-align: left;
      padding: 8px;
      z-index: 1;
    }

    .map-node:hover,
    .object-btn:hover,
    .choice-btn:hover,
    .primary-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(28,43,55,.12);
    }

    .map-node.active {
      border-color: var(--teal);
      background: var(--mint);
    }

    .map-node.locked {
      color: #7a8790;
      background: #f2f5f6;
      cursor: not-allowed;
    }

    .bang {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--rose);
      font-weight: 900;
    }

    .node-title {
      display: block;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .node-sub {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .room-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .room-title h2 {
      margin: 0;
      font-size: 25px;
    }

    .room-title p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .object-grid {
      position: relative;
      min-height: 380px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(204,219,226,.22) 1px, transparent 1px),
        linear-gradient(180deg, rgba(204,219,226,.22) 1px, transparent 1px),
        #fbfdfe;
      background-size: 38px 38px;
      overflow: hidden;
    }

    .object-grid::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 2px solid rgba(159,180,190,.45);
      border-radius: 12px;
      pointer-events: none;
    }

    .object-btn {
      min-height: 104px;
      position: absolute;
      width: 30%;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 14px 12px 12px 88px;
      text-align: left;
      z-index: 1;
      overflow: hidden;
    }

    .object-btn::before {
      content: attr(data-icon);
      position: absolute;
      right: 10px;
      bottom: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--teal);
      font-size: 13px;
      font-weight: 900;
    }

    .object-figure {
      position: absolute;
      left: 14px;
      top: 16px;
      width: 56px;
      height: 62px;
      display: block;
      color: var(--teal);
    }

    .object-figure::before,
    .object-figure::after,
    .object-figure i {
      content: "";
      position: absolute;
      display: block;
    }

    .object-btn[data-scene="npc"] .object-figure::before {
      width: 24px;
      height: 24px;
      left: 16px;
      top: 2px;
      border-radius: 50%;
      background: #f1c9a8;
      box-shadow: inset 0 -5px rgba(88,60,44,.12);
    }

    .object-btn[data-scene="npc"] .object-figure::after {
      width: 42px;
      height: 32px;
      left: 7px;
      bottom: 2px;
      border-radius: 16px 16px 8px 8px;
      background: linear-gradient(135deg, #1d8a7c, #79b7aa);
    }

    .object-btn[data-scene="child"] .object-figure::before {
      width: 22px;
      height: 22px;
      left: 17px;
      top: 4px;
      border-radius: 50%;
      background: #f4cfb1;
    }

    .object-btn[data-scene="child"] .object-figure::after {
      width: 36px;
      height: 30px;
      left: 10px;
      bottom: 4px;
      border-radius: 15px 15px 8px 8px;
      background: linear-gradient(135deg, #d55e6f, #f0a56e);
    }

    .object-btn[data-scene="desk"] .object-figure::before,
    .object-btn[data-scene="computer"] .object-figure::before {
      width: 48px;
      height: 26px;
      left: 4px;
      top: 14px;
      border-radius: 4px;
      background: linear-gradient(180deg, #dfeaf0, #9fb6c1);
      border: 2px solid #6d8491;
    }

    .object-btn[data-scene="desk"] .object-figure::after,
    .object-btn[data-scene="computer"] .object-figure::after {
      width: 54px;
      height: 10px;
      left: 1px;
      bottom: 8px;
      border-radius: 3px;
      background: #7f919b;
    }

    .object-btn[data-scene="paper"] .object-figure::before,
    .object-btn[data-scene="file"] .object-figure::before {
      width: 38px;
      height: 48px;
      left: 9px;
      top: 4px;
      border-radius: 4px;
      background: #fffaf0;
      border: 2px solid #d8c48f;
      box-shadow: 8px 8px 0 rgba(216,196,143,.24);
    }

    .object-btn[data-scene="paper"] .object-figure::after,
    .object-btn[data-scene="file"] .object-figure::after {
      width: 24px;
      height: 3px;
      left: 16px;
      top: 23px;
      background: #9fb6c1;
      box-shadow: 0 8px 0 #9fb6c1, 0 16px 0 #9fb6c1;
    }

    .object-btn[data-scene="door"] .object-figure::before {
      width: 34px;
      height: 54px;
      left: 11px;
      top: 4px;
      border-radius: 6px 6px 2px 2px;
      background: linear-gradient(135deg, #5a4639, #8f6b4f);
      box-shadow: inset -8px 0 rgba(0,0,0,.12);
    }

    .object-btn[data-scene="door"] .object-figure::after {
      width: 7px;
      height: 7px;
      right: 14px;
      top: 31px;
      border-radius: 50%;
      background: #f1c84b;
    }

    .object-btn[data-scene="device"] .object-figure::before {
      width: 32px;
      height: 52px;
      left: 12px;
      top: 3px;
      border-radius: 8px;
      background: #263743;
      border: 3px solid #5f7684;
    }

    .object-btn[data-scene="device"] .object-figure::after {
      width: 20px;
      height: 28px;
      left: 18px;
      top: 13px;
      border-radius: 3px;
      background: linear-gradient(180deg, #9bd7ef, #4b91aa);
    }

    .object-btn[data-scene="machine"] .object-figure::before {
      width: 48px;
      height: 38px;
      left: 4px;
      top: 12px;
      border-radius: 6px;
      background: #e7eef2;
      border: 2px solid #8298a4;
    }

    .object-btn[data-scene="machine"] .object-figure::after {
      width: 24px;
      height: 10px;
      left: 16px;
      top: 26px;
      border-radius: 2px;
      background: #1d8a7c;
      box-shadow: 0 18px 0 #8298a4;
    }

    .object-btn.solved {
      border-color: var(--teal);
      background: #f0fbf7;
    }

    .object-btn.locked {
      opacity: .58;
      background: #f4f7f8;
    }

    .object-btn strong {
      display: block;
      margin-bottom: 4px;
    }

    .object-btn .object-sub {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .console {
      border-radius: 0;
      border-top: 0;
      border-right: 0;
      border-bottom: 0;
      box-shadow: none;
      background: #f7fbff;
      padding: 18px;
      overflow: auto;
    }

    .console h2 {
      margin: 0 0 8px;
      font-size: 19px;
    }

    .log {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .feedback {
      margin-top: 12px;
      min-height: 28px;
      color: var(--muted);
      line-height: 1.65;
    }

    .feedback.good { color: var(--teal-dark); }
    .feedback.warn { color: #9a4f1c; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(13,24,32,.46);
      backdrop-filter: blur(4px);
    }

    .modal-backdrop[hidden] { display: none; }

    .modal-card {
      width: min(780px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: #fff;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .modal-body {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .modal-body p {
      margin: 0;
      color: #344552;
      line-height: 1.75;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .text-input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 12px;
      width: 100%;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice-btn {
      padding: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: left;
      min-height: 72px;
    }

    .choice-btn.selected,
    .choice-btn.good {
      border-color: var(--teal);
      background: var(--mint);
    }

    .case-file {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 6px;
    }

    .case-file strong { color: var(--teal-dark); }
    .case-file span { color: var(--muted); font-size: 13px; }

    .supervisor-call {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .supervisor-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 24%, #f1c9a8 0 16px, transparent 17px),
        linear-gradient(135deg, #5f68b2, #1d8a7c);
      box-shadow: inset 0 -10px rgba(0,0,0,.08), 0 10px 22px rgba(28,43,55,.14);
      position: relative;
    }

    .supervisor-avatar::after {
      content: "";
      position: absolute;
      width: 44px;
      height: 22px;
      left: 14px;
      bottom: 10px;
      border-radius: 18px 18px 10px 10px;
      background: rgba(255,255,255,.82);
    }

    .supervisor-lines {
      display: grid;
      gap: 10px;
    }

    .supervisor-lines p {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fcfb;
    }

    .drop-zone {
      min-height: 76px;
      border: 1px dashed #9fb6c1;
      border-radius: var(--radius);
      background: #f8fbfc;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 10px;
    }

    .drop-zone.drag-over {
      border-color: var(--teal);
      background: var(--mint);
      color: var(--teal-dark);
    }

    .marquee {
      position: fixed;
      left: 16px;
      right: 16px;
      top: 8px;
      z-index: 70;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-18px);
      transition: opacity 260ms ease, transform 260ms ease;
      background: #fff0f2;
      border: 1px solid #e7b7bf;
      color: #8d3141;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      box-shadow: 0 10px 24px rgba(28,43,55,.14);
    }

    .marquee.show {
      opacity: 1;
      transform: translateY(0);
    }

    .shake {
      animation: shake .24s linear 2;
    }

    @keyframes pulse {
      0%, 100% { opacity: .5; }
      50% { opacity: 1; }
    }

    @keyframes thread { to { stroke-dashoffset: -16; } }
    @keyframes scan { from { transform: translateX(-80px); } to { transform: translateX(680px); } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; min-height: auto; }
      .workspace { grid-template-columns: 1fr; }
      .console { border-left: 0; border-top: 1px solid var(--line); }
      .main { grid-template-rows: minmax(350px, 40vh) auto; }
    }

    @media (max-width: 720px) {
      .app { padding: 10px; gap: 10px; }
      .map-grid, .object-grid, .choice-grid, .input-row { grid-template-columns: 1fr; }
      .stage-title { font-size: 30px; }
    }
  </style>

    const els = {
      roleGrid: document.getElementById("roleGrid"),
      inventoryList: document.getElementById("inventoryList"),
      safetyValue: document.getElementById("safetyValue"),
      trustValue: document.getElementById("trustValue"),

      timeValue: document.getElementById("timeValue"),
      mapGrid: document.getElementById("mapGrid"),
      objectGrid: document.getElementById("objectGrid"),

      roomDesc: document.getElementById("roomDesc"),

    };

    function has(id) { return state.inventory.includes(id); }
    function clamp(n) { return Math.max(0, Math.min(100, n)); }
    function selectedIds() { return Array.from(state.selected); }

    function gain(id, message) {
      if (!has(id)) {
        state.inventory.push(id);
        log("取得：" + items[id].name);
        state.evidence = clamp(state.evidence + (items[id].type === "evidence" ? 35 : 6));
      }
      good(message || "取得「" + items[id].name + "」。");
      update();
    }

    function log(text) {
      state.log.unshift(text);
      state.log = state.log.slice(0, 12);
    }

    function good(text) {
      els.feedback.textContent = text;
      els.feedback.className = "feedback good";
    }

    function warn(text) {
      els.feedback.textContent = text;
      els.feedback.className = "feedback warn";
      state.procedure = clamp(state.procedure + 4);
      state.time = clamp(state.time + 4);
      els.stage.classList.add("shake");
      window.setTimeout(() => els.stage.classList.remove("shake"), 380);
      update();
    }

    function useAction(cost = 1) {
      state.action = Math.max(0, state.action - cost);
      state.time = clamp(state.time + 3 * cost);
      if (state.action <= 1) showMarquee("督導訊息：黃金時間正在流失，請自行判斷風險。");
    }

    function showMarquee(text) {
      els.marquee.textContent = text;
      els.marquee.classList.add("show");
      window.setTimeout(() => els.marquee.classList.remove("show"), 3600);
    }

    function supervisorCall() {
      const vague = [
        "督導來電：有沒有查過其他可能接觸孩子的場域？",
        "督導來電：會談模式可以再調整一下，先不要把關係弄僵。",
        "督導來電：你再綜整一下跨網絡資訊，應該會比較清楚。",
        "督導來電：程序要顧，現場也要顧，你自己判斷。",
        "督導來電：你可以再問問看誰最後看到孩子，但不要讓對方覺得被偵訊。",
        "督導來電：資訊量太多時，先把時間、地點、照顧者三條線分開。",
        "督導來電：如果現場關係卡住，換一個角度進去，不一定要硬碰硬。",
        "督導來電：你再確認一下文件權限，沒有授權就要找替代路徑。",
        "督導來電：先不要急著定性，看看哪一段資料最怕被人看見。",
        "督導來電：有些人不是不知道答案，是不敢把答案講完整。"
      ];
      const showSupervisor = (title, lines, remaining) => {
        openModal(title, `
          <div class="supervisor-call">
            <div class="supervisor-avatar" aria-hidden="true"></div>
            <div class="supervisor-lines">
              ${lines.map(line => `<p>${line}</p>`).join("")}
              <p>可用提示：${remaining} 次</p>
            </div>
          </div>
        `);
      };
      if (state.hintsLeft <= 0) {
        state.procedure = clamp(state.procedure + 3);
        const first = vague[Math.floor(Math.random() * vague.length)];
        let second = vague[Math.floor(Math.random() * vague.length)];
        if (second === first) second = vague[(vague.indexOf(first) + 3) % vague.length];
        showSupervisor("督導來電", [first, second], 0);
        update();
        return;
      }
      const hints = {
        radio: [
          "對講機不是猜密碼，先想誰掌握最早的目擊時間。",
          "把廣場取得的時間資訊和通訊設備放在同一條線上。"
        ],
        phone: [
          "手機通常會和孩子自己的日常紀錄連在一起。",
          "校園資料裡有一串不太像時間、比較像孩子識別碼的數字。"
        ],
        policeComputer: [
          "警務端要的不是現場觀察，而是登入權限。",
          "有些帳密不會貼在電腦上，會留在習慣做紙本紀錄的人手邊。"
        ],
        printer: [
          "機器需要參數，但參數應該先從維修資料來。",
          "如果還沒看過材料、溫度或厚度，就先不要硬試。"
        ],
        default: [
          "先看已揭露資料屬於時間、身分、傷勢、動線或權限哪一類。",
          "再想哪一個專業角色最可能看懂這類資料。"
        ]
      };
      state.hintsLeft -= 1;
      showSupervisor("督導來電", hints[state.lastInteraction] || hints.default, state.hintsLeft);
      update();
    }

    function setRole(role) {
      if (state.role === role) return;
      state.role = role;
      useAction(1);
      if (role === "police" && state.location === "mystery") {
        state.safety = clamp(state.safety + 8);
        state.trust = clamp(state.trust - 8);
        warn("警務視角提高現場控制，但孩子對制服感到緊張，信任下降。");
      }
      if (role === "medical") addMedicalClutter(false);
      update();
    }

    function renderRoles() {
      els.roleGrid.innerHTML = Object.entries(roles).map(([id, role]) => `
        <button class="role-btn ${state.role === id ? "active" : ""}" data-role="${id}" type="button">
          <span class="role-icon">${role.icon}</span>
          <span><span class="role-name">${role.name}</span><span class="role-skill">${role.skill}</span></span>
        </button>
      `).join("");
      els.roleGrid.querySelectorAll(".role-btn").forEach(btn => btn.addEventListener("click", () => setRole(btn.dataset.role)));
    }

    function renderMap() {
      const coords = {
        plaza: [6, 28],
        school: [39, 7],
        police: [32, 66],
        clinic: [76, 28],
        station: [75, 66],
        mystery: [57, 41]
      };
      els.mapGrid.innerHTML = Object.entries(locations).map(([id, loc]) => {
        const open = loc.open();
        const active = state.location === id;
        const lockText = open ? "可進入" : loc.locked;
        const [left, top] = coords[id] || [10, 10];
        return `
          <button class="map-node ${active ? "active" : ""} ${open ? "" : "locked"}" style="left:${left}%; top:${top}%;" data-location="${id}" title="${lockText}" type="button">
            ${open ? "" : `<span class="bang">!</span>`}
            <span class="node-title">${loc.name}</span>
            <span class="node-sub">${open ? loc.desc : lockText}</span>
          </button>
        `;
      }).join("");
      els.mapGrid.querySelectorAll(".map-node").forEach(node => node.addEventListener("click", () => goLocation(node.dataset.location)));
    }

    function goLocation(id) {
      const loc = locations[id];
      if (!loc.open()) {
        const selected = selectedIds()[0];
        if (id === "school" && selected === "copperKey") {
          state.flags.add("school_open");
          state.selected.clear();
          good("你把銅色鑰匙插入側門，小學節點解鎖。");
          state.location = "school";
          useAction(1);
        } else {
          warn(loc.locked);
          if (id === "station" && state.evidence < 60) showMarquee("警務端：這是家務事，沒有明確證據我們不能破門。");
        }
      } else {
        state.location = id;
      }
      update();
    }

    function renderRoom() {
      const loc = locations[state.location];
      els.roomName.textContent = loc.name;
      els.roomDesc.textContent = loc.desc;
      els.stage.dataset.focus = loc.focus;
      els.stage.classList.remove("role-social", "role-police", "role-medical");
      els.stage.classList.add("role-" + state.role);
      els.stage.style.setProperty("--pressure", (state.procedure + state.time) / 180);
      els.stageTitle.textContent = loc.name;
      els.stageKicker.textContent = state.role === "social" ? "社工視角" : state.role === "police" ? "警務視角" : "醫療視角";
      els.stationLayer.classList.toggle("unlocked", locations.station.open());
      els.objectGrid.innerHTML = loc.objects.map(id => {
        const obj = objectDefs[id];
        const solved = state.solvedObjects.has(id);
        const locked = objectLocked(id);
        const [left, top] = obj.pos || [15, 15];
        return `
          <button class="object-btn ${solved ? "solved" : ""} ${locked ? "locked" : ""}" style="left:${left}%; top:${top}%;" data-scene="${obj.scene || "file"}" data-icon="${obj.icon || "物"}" data-object="${id}" type="button">
            ${locked ? `<span class="bang">!</span>` : ""}
            <span class="object-figure" aria-hidden="true"><i></i></span>
            <strong>${obj.title}</strong>
            <span class="object-sub">${locked ? locked : obj.sub}</span>
          </button>
        `;
      }).join("");
      els.objectGrid.querySelectorAll(".object-btn").forEach(btn => btn.addEventListener("click", () => interactObject(btn.dataset.object)));
    }

    function objectLocked(id) {
      if (id === "policeComputer" && state.role !== "police") return "需要警務會員操作。";
      if (id === "diagnosis" && (!has("socialId") || !has("emergencyReport"))) return "需要社工身分證明 + 緊急通報單。";
      if (id === "monitorRoom" && !state.flags.has("power_repaired")) return "監控室沒電。";
      if (id === "rescueDoor" && !has("longTermStatement")) return "缺少核心道具：長期受暴證詞。";
      return "";
    }

    function interactObject(id) {
      const locked = objectLocked(id);
      if (locked) {
        warn(locked);
        return;
      }
      objectDefs[id].action();
      update();
    }

    function renderInventory() {
      els.inventoryList.innerHTML = state.inventory.map(id => {
        const item = items[id];
        const selected = state.selected.has(id);
        return `
          <li>
            <button class="item-btn ${selected ? "selected" : ""}" data-item="${id}" draggable="true" type="button">${item.name}</button>
            ${item.type === "clutter" ? `<button class="small-btn" data-purge="${id}" type="button">清除</button>` : ""}
          </li>
        `;
      }).join("");
      els.inventoryList.querySelectorAll(".item-btn").forEach(btn => {
        btn.addEventListener("click", () => toggleItem(btn.dataset.item));
        btn.addEventListener("dblclick", () => inspectItem(btn.dataset.item));
        btn.addEventListener("dragstart", e => e.dataTransfer.setData("text/plain", btn.dataset.item));
      });
      els.inventoryList.querySelectorAll(".small-btn").forEach(btn => btn.addEventListener("click", () => purgeItem(btn.dataset.purge)));
    }

    function toggleItem(id) {
      if (state.selected.has(id)) state.selected.delete(id);
      else if (state.selected.size < 3) state.selected.add(id);
      else warn("合成槽最多放三個物件。");
      update();
    }

    function purgeItem(id) {
      state.inventory = state.inventory.filter(item => item !== id);
      state.selected.delete(id);
      state.network = clamp(state.network + 2);
      good("已清除不相關醫療紀錄，避免其他個案隱私混入。");
      update();
    }

    function inspectItem(id) {
      const item = items[id];
      openModal(item.name, `
        <p>${item.text}</p>
        <div class="drop-zone" id="inspectDrop">拖曳到角色視角：${roles[state.role].name}</div>
      `);
      const zone = document.getElementById("inspectDrop");
      zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
      zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
      zone.addEventListener("drop", e => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        good("你用「" + roles[state.role].name + "」重新判讀「" + item.name + "」。");
        state.evidence = clamp(state.evidence + 2);
        update();
      });
    }

    function combineNudge(set) {
      if (!set.length) return "合成槽是空的。先選取你覺得彼此有關的資料。";
      const typeText = set.map(id => items[id].type).join("、");
      const hasMedical = set.some(id => ["diagnosis", "injuryPhoto", "medBag"].includes(id) || items[id].type === "medical");
      const hasMovement = set.some(id => ["blurryCctv", "stationVideo", "phoneLog"].includes(id) || items[id].type === "tape");
      const hasAuthority = set.some(id => ["oldNotebook", "policeAccount", "socialId", "emergencyReport"].includes(id));
      const hasChildVoice = set.some(id => ["phoneLog", "safetyResponse", "anonymizedCase"].includes(id));
      if (hasMedical && !hasMovement) return "這組資料偏向傷勢與照護紀錄，可能還缺一段能說明人怎麼移動的畫面或通訊。";
      if (hasMovement && !hasMedical) return "這組資料有動線感，但還缺能讓現場單位改口的專業判讀。";
      if (hasAuthority && set.length < 2) return "這比較像權限鑰匙。想想哪一個桌面或系統會在意它。";
      if (hasChildVoice && set.length < 3) return "孩子留下的是感受與片段，不要急著當成密碼；也許要和另一種客觀資料放在一起。";
      if (set.length === 3) return "三份資料已經足夠形成工作假設，但目前視角可能還沒對上：誰最關心動線、誰最關心傷勢、誰最關心孩子願不願意說。";
      return "目前選到的資料類型是：" + typeText + "。先判斷它們是在談時間、權限、傷勢、動線，還是孩子的安全感。";
    }

    function combineItems() {
      const set = selectedIds().sort();
      const recipes = [
        { needs: ["oldNotebook"], result: "policeAccount", role: null, message: "你把紙本習慣轉成可登入的權限線索。" },
        { needs: ["radioChannel", "anonymizedCase"], result: "emergencyReport", role: "social", message: "你把通訊片段與去識別化紀錄對上，整理出可送出的程序文件。" },
        { needs: ["diagnosis", "injuryPhoto", "blurryCctv"], result: "routeMap", role: "police", evidence: 65, message: "傷勢、影像與現場觀察交叉後，動線開始變得足以說服現場單位。" },
        { needs: ["phoneLog", "stationVideo"], result: "safetyResponse", role: "social", message: "孩子留下的訊息和車站影像接上了，下一步要先處理他的擔心而不是追密碼。" },
        { needs: ["diagnosis", "anonymizedCase", "stationVideo"], result: "longTermStatement", role: null, mdt: true, message: "醫療、程序與影像被放在同一個脈絡裡，形成可支撐救援的核心工作假設。" }
      ];
      const recipe = recipes.find(r => r.needs.length === set.length && r.needs.every(id => set.includes(id)));
      if (!recipe) {
        warn(combineNudge(set));
        return;
      }
      if (recipe.role && state.role !== recipe.role) {
        warn("這組資料的關鍵不是內容本身，而是判讀者。換成更關心「" + roles[recipe.role].skill + "」的視角再試。");
        return;
      }
      if (recipe.mdt && !(has("diagnosis") && has("anonymizedCase") && has("stationVideo"))) {
        warn("這不是單一專業能拼完的資料。至少要同時看見傷勢、程序紀錄與現場影像。");
        return;
      }
      gain(recipe.result, recipe.message);
      if (recipe.evidence) state.evidence = Math.max(state.evidence, recipe.evidence);
      if (recipe.result === "routeMap") {
        state.network = clamp(state.network + 12);
        showMarquee("警務端改口：證據價值足夠，舊車站可以進入。");
      }
      state.selected.clear();
      update();
    }

    function openPhone() {

    function createEmergencyReport() {
      if (has("radioChannel") && has("anonymizedCase")) {
        gain("emergencyReport", "你用對講機通報與去識別化案號產出緊急通報單。");

    function addMedicalClutter(show = true) {
      if (!has("clutter1")) state.inventory.push("clutter1");
      if (!has("clutter2")) state.inventory.push("clutter2");
      state.action = Math.max(0, state.action - 1);
      state.procedure = clamp(state.procedure + 8);
      if (show) warn("醫療通報匣湧入大量無關紀錄。請清理，否則資訊過載會拖慢救援。");
      update();
    }

    function inspectMedBag() {
      if (state.role !== "medical") {
        warn("藥袋需要醫療會員判讀。");
        return;
      }
      openModal("藥袋分析", `
        <p>藥袋上標示：夜間服用可能嗜睡。醫療會員判讀：孩子的沉默不應直接被解讀成配合。</p>
        <button class="primary-btn" id="medOk">記錄醫療觀察</button>
      `);
      document.getElementById("medOk").addEventListener("click", () => {
        state.evidence = clamp(state.evidence + 8);
        state.safety = clamp(state.safety + 4);
        good("已記錄藥物副作用與過度鎮靜風險。");
        closeModal();
      });
    }

    function openDiagnosis() {
      if (has("socialId") && has("emergencyReport")) {
        gain("diagnosis", "醫院開啟權限，你取得去識別化診斷證明：疑似非意外傷勢。");
      } else warn("診斷書需要社工身分證明與緊急通報單。");
    }

    function purgeAllClutter() {
      const before = state.inventory.length;
      state.inventory = state.inventory.filter(id => items[id].type !== "clutter");
      state.selected = new Set(Array.from(state.selected).filter(id => state.inventory.includes(id)));
      if (state.inventory.length < before) {
        state.network = clamp(state.network + 6);
        good("已清理無關醫療紀錄，保留本案必要資訊。");
      } else warn("目前沒有需要清理的無關醫療紀錄。");
    }

    function checkStationDoor() {
      if (has("routeMap") && state.evidence >= 60) {
        good("警務端不再能用『證據不足』擋住你。車站監控室可探索。");
      } else warn("證據價值不足，車站仍被封鎖。");
    }

    function openPrinter() {
      state.lastInteraction = "printer";
      if (!has("printSpec")) {
        warn("列印機只顯示空白參數欄。你需要先在車站內找到規格資料。");
        return;
      }
      openModal("3D 列印機", `
        <p>列印機要求三段參數：噴頭溫度 / 填充率 / 厚度。請先確認維修箱裡的規格資料。</p>
        <div class="input-row"><input class="text-input" id="printInput" placeholder="溫度-填充-厚度"><button class="primary-btn" id="printBtn">列印</button></div>
      `);
      document.getElementById("printBtn").addEventListener("click", () => {
        if (document.getElementById("printInput").value.trim() === "210-40-2") {
          gain("printedClip", "3D 列印卡榫完成。");
          closeModal();
        } else warn("參數錯誤，卡榫無法密合。");
      });
    }

    function repairPowerBox() {
      if (has("printedClip")) {
        state.flags.add("power_repaired");
        good("你把 3D 列印卡榫裝上，監控室電力恢復。");
      } else {
        gain("wire", "你找到斷掉的監控室電線，但還缺 3D 列印卡榫。");
      }
    }

    function openStationVideo() {
      if (!state.flags.has("power_repaired")) {
        warn("監控室沒電。");
        return;
      }
      gain("stationVideo", "車站監控片段顯示：灰外套者曾任活動中心志工，利用熟人信任接近孩子。");
      state.flags.add("mystery_open");
      state.network = clamp(state.network + 10);
    }

    function childTalk(which) {
      if (Date.now() < state.childCooldownUntil) {
        const seconds = Math.ceil((state.childCooldownUntil - Date.now()) / 1000);
        warn("孩子現在不願意繼續談，請等待 " + seconds + " 秒，或先處理其他空間。");
        return;
      }
      const data = {
        you: {
          name: "小祐",
          line: "「如果我走了，那個人會去抓弟弟嗎？我剛剛聽到他說還知道我家的地址。」",
          good: "你承諾會同步確認弟弟位置，孩子安全回應表開始成形。",
          options: [
            ["plan", "先確認弟弟位置，並說明誰會同步陪伴他", 10, 5],
            ["rush", "先叫小祐快走，弟弟之後再說", -12, 2],
            ["promise", "保證那個人一定不會再靠近任何人", -8, 0],
            ["police", "請警務會員先守住出口，再回來說明弟弟安排", 3, 8]
          ]
        },
        qing: {
          name: "小晴",
          line: "「他以前在活動中心幫忙，大家都叫我不要亂說。你們會不會也覺得我在說謊？」",
          good: "你先接住害怕，再說明每一步，孩子願意補充細節。",
          options: [
            ["believe", "先說明你相信她的害怕，會用安全方式記錄", 12, 3],
            ["detail", "要求她立刻講出完整姓名與時間", -14, -2],
            ["compare", "拿其他孩子說法逼她確認", -10, 0],
            ["ground", "先陪她做短暫呼吸，再詢問是否能繼續", 7, 5]
          ]
        },
        nan: {
          name: "小南",
          line: "「如果大人都互相推來推去，我們是不是又要回去？我不想再坐那台車。」",
          good: "你說明社工、醫療、警務各自會做什麼，孩子稍微點頭。",
          options: [
            ["mdt", "具體說明社工、醫療、警務接下來各自負責什麼", 9, 8],
            ["deny", "告訴他不要再想那台車，現在沒事了", -9, 0],
            ["warn", "提醒他如果不配合就會拖慢救援", -15, -4],
            ["choice", "給他兩個可選擇的小步驟，讓他恢復一點控制感", 10, 4]
          ]
        }
      }[which];
      if (state.role === "police") {
        state.safety = clamp(state.safety + 4);
        state.trust = clamp(state.trust - 7);
        warn(data.name + "退了一步。制服感讓孩子更緊張。");
        return;
      }
      openModal(data.name, `
        <p>${data.line}</p>
        <div class="choice-grid">
          ${data.options.map(option => `<button class="choice-btn child-option" data-trust="${option[2]}" data-safety="${option[3]}" data-good="${option[2] > 0 ? "1" : "0"}">${option[1]}</button>`).join("")}
        </div>
      `);
      document.querySelectorAll(".child-option").forEach(button => {
        button.addEventListener("click", () => {
          const trustDelta = Number(button.dataset.trust);
          const safetyDelta = Number(button.dataset.safety);
          state.trust = clamp(state.trust + trustDelta);
          state.safety = clamp(state.safety + safetyDelta);
          if (trustDelta > 0) {
            gain("safetyResponse", data.good);
          } else {
            warn("孩子沉默了。信任關係下降，後續訪談會需要緩衝。");
          }
          if (state.trust < 40) {
            state.childCooldownUntil = Date.now() + 20000;
            showMarquee("孩子進入防備狀態：請暫停追問，等待情緒緩衝。");
          }
          closeModal();
        });
      });
    }

    function openRescueDoor() {
      if (!has("longTermStatement")) {
        warn("救援按鈕沒有生效：缺少核心道具「長期受暴證詞」。");
        return;
      }
      openModal("MDT 順序救援", `
        <p>拖延太久會讓壓力上升。請依序選擇救援動作。</p>
        <div class="choice-grid">
          <button class="choice-btn rescue" data-step="social">社工安撫環境</button>
          <button class="choice-btn rescue" data-step="medical">醫療確認傷勢</button>
          <button class="choice-btn rescue" data-step="police">警務護送離開</button>
        </div>
        <p id="rescueOrderText">目前順序：尚未選擇</p>
      `);
      document.querySelectorAll(".rescue").forEach(btn => btn.addEventListener("click", () => {
        state.rescueOrder.push(btn.dataset.step);
        document.getElementById("rescueOrderText").textContent = "目前順序：" + state.rescueOrder.join(" → ");
        if (state.rescueOrder.length === 3) finishGame();
      }));
    }

    function finishGame() {
      const correct = state.rescueOrder.join(",") === "social,medical,police";
      if (correct) {
        state.safety = clamp(state.safety + 18);
        state.trust = clamp(state.trust + 12);
        state.network = clamp(state.network + 16);
      } else {
        state.safety = clamp(state.safety + 6);
        state.trust = clamp(state.trust - 14);
        state.network = clamp(state.network - 8);
        state.procedure = clamp(state.procedure + 15);
      }
      const ending = getEnding();
      openModal(ending.title, `
        <p>${ending.body}</p>
        <p><strong>結案評估：</strong>${ending.assessment}</p>
        <div class="stat-grid">
          <div class="stat"><strong>${state.safety}</strong><span>安全</span></div>
          <div class="stat"><strong>${state.trust}</strong><span>信任</span></div>
          <div class="stat"><strong>${state.network}</strong><span>協作</span></div>
          <div class="stat"><strong>${state.procedure}</strong><span>程序壓力</span></div>
        </div>
      `);
      log("結局：" + ending.title);
      update();
    }

    function getEnding() {
      if (state.safety > 80 && state.trust > 80 && state.network > 80 && state.procedure < 45) {
        return {
          title: "結局 A：專業協作的微光",
          body: "三名孩子被接走，醫療、警務、學校與社政接應順暢。灰外套者作為曾任志工的熟人被控制，社區開始修補信任裂痕。",
          assessment: "不是完美勝利，而是在有限資源裡把安全、信任與網絡勉強接成一條可以走的路。"
        };
      }
      if (state.action <= 0 || state.time >= 70) {
        return {
          title: "結局 B：遲到的正義",
          body: "你完成通報，也走完程序，但行動點在體制摩擦中耗盡。孩子被救出，卻在延遲裡承受更多驚嚇。",
          assessment: "程序正確不等於救援即時。黃金時間也會留下傷。"
        };
      }
      if (state.safety > 78 && (state.trust < 50 || state.network < 50)) {
        return {
          title: "結局 C：體制性的遺憾",
          body: "你強行推開出口，也確實把孩子帶出奧秘空間；但孩子對所有穿制服的人更加恐懼，家長提起申訴，警務端開始把責任推回社工端。",
          assessment: "逃脫成功了，但守護失敗了。"
        };
      }
      return {
        title: "結局：半開的門",
        body: "孩子們被找到，但後續接應仍有破口。督導加入現場，補上安全評估與後續追蹤。",
        assessment: "你完成了必要行動，但還需要更精準的 MDT 協作。"
      };
    }

    function openModal(title, bodyHtml) {
      els.modalTitle.textContent = title;
      els.modalBody.innerHTML = bodyHtml;
      els.modal.hidden = false;
    }

    function closeModal() {
      els.modal.hidden = true;
      els.modalBody.innerHTML = "";
    }

    function updateStats() {
      els.safetyValue.textContent = state.safety;
      els.trustValue.textContent = state.trust;
      els.networkValue.textContent = state.network;
      els.safetyBar.style.width = state.safety + "%";
      els.trustBar.style.width = state.trust + "%";
      els.networkBar.style.width = state.network + "%";
      els.actionValue.textContent = state.action;
      els.evidenceValue.textContent = state.evidence;
      els.procedureValue.textContent = state.procedure;
      els.timeValue.textContent = state.time;
      els.hintBtn.textContent = state.hintsLeft > 0 ? "督導來電 (" + state.hintsLeft + ")" : "督導來電";
    }

    function updateLog() {
      els.logList.innerHTML = state.log.map(item => `<li>${item}</li>`).join("");
    }

    function update() {
      updateStats();
      renderRoles();
      renderInventory();
      renderMap();
      renderRoom();
      updateLog();
      if (state.procedure > 55) showMarquee("督導跑馬燈：請在合法合規下自行判斷，並自行承擔現場判斷。");
    }

    function restart() {
      state.role = "social";
      state.location = "plaza";
      state.inventory = [];
      state.selected = new Set();
      state.flags = new Set(["plaza_open"]);
      state.solvedObjects = new Set();
      state.log = [];
      state.safety = 50;
      state.trust = 50;
      state.network = 50;
      state.evidence = 0;
      state.procedure = 0;
      state.action = 8;
      state.time = 0;
      state.hintsLeft = 3;
      state.lastInteraction = "";
      state.childCooldownUntil = 0;
      state.rescueOrder = [];
      closeModal();
      update();
    }

    els.closeModalBtn.addEventListener("click", closeModal);
    els.modal.addEventListener("click", event => { if (event.target === els.modal) closeModal(); });
    els.combineBtn.addEventListener("click", combineItems);
    els.clearSelectionBtn.addEventListener("click", () => { state.selected.clear(); update(); });
    els.hintBtn.addEventListener("click", supervisorCall);
    els.restartBtn.addEventListener("click", restart);

    update();
  </script>
</body>
</html>
