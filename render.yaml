services:
  - type: web
    name: starlight-child-protection-game
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: starlight-leaderboard-db
          property: connectionString

databases:
  - name: starlight-leaderboard-db
    plan: free
